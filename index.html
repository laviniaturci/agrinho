<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Interativo</title>
    <!-- Vinculação do arquivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cabeçalho do Site -->
    <header>
        <div class="logo">MeuSite</div>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <section class="banner">
            <h1>Bem-vindo ao Futuro do Desenvolvimento Web</h1>
            <p>Este site foi construído utilizando as três tecnologias fundamentais da internet: HTML, CSS e JavaScript.</p>
            <button id="btn-acao">Clique Aqui</button>
        </section>

        <!-- Seção Interativa -->
        <section class="contador-container">
            <h2>Contador Dinâmico</h2>
            <p>Cliques registrados: <span id="contador">0</span></p>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2026 MeuSite. Todos os direitos reservados.</p>
    </footer>

    <!-- Vinculação do arquivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
